name: CI

on:
  workflow_dispatch:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: ruff check src tests
      - run: ruff format --check src tests
      - run: pytest --cov=sales_pipeline --cov-report=term-missing --cov-fail-under=85
      - run: sales-pipeline data/raw/sales_orders.csv --output-dir "${{ runner.temp }}/sales-reports"
